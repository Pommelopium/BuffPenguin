<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuffPenguin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <span class="app-logo">BuffPenguin</span>
      <nav class="app-nav">
        <button class="nav-btn" data-nav="dashboard">Workouts</button>
        <button class="nav-btn" data-nav="exercises">Exercises</button>
        <button class="nav-btn" data-nav="weight">Weight</button>
        <button class="nav-btn" data-nav="calories">Calories</button>
        <button class="nav-btn" data-nav="settings">Settings</button>
      </nav>
      <select id="lang-select" class="lang-select">
        <option value="en">EN</option>
        <option value="de">DE</option>
      </select>
    </header>
    <main class="app-main" id="main">
      <div class="loading">Loading…</div>
    </main>
    <div id="toast" class="toast hidden"></div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
