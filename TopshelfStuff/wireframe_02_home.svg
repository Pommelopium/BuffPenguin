  <line x1="5" y1="195" x2="415" y2="195" stroke="#1C1C1C" stroke-width="1"/>

  <!-- Section label -->
  <text x="20" y="218" fill="#666" font-size="11" letter-spacing="0.8">RECENT SESSIONS</text>

  <!-- ── SESSION LIST ITEMS ── -->

  <!-- Item 1 -->
  <text x="20" y="248" fill="#FFF" font-size="14" font-weight="500">Mon, Mar 17 – 09:30</text>
  <text x="20" y="268" fill="#666" font-size="12">Upper body push</text>
  <text x="398" y="259" fill="#444" font-size="22" text-anchor="end">›</text>
  <line x1="20" y1="282" x2="400" y2="282" stroke="#1C1C1C" stroke-width="1"/>

  <!-- Item 2 -->
  <text x="20" y="308" fill="#FFF" font-size="14" font-weight="500">Sat, Mar 15 – 17:15</text>
  <text x="20" y="328" fill="#666" font-size="12">Legs &amp; core</text>
  <text x="398" y="319" fill="#444" font-size="22" text-anchor="end">›</text>
  <line x1="20" y1="342" x2="400" y2="342" stroke="#1C1C1C" stroke-width="1"/>

  <!-- Item 3 -->
  <text x="20" y="368" fill="#FFF" font-size="14" font-weight="500">Thu, Mar 13 – 08:00</text>
