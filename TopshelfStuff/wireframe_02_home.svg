  <text x="398" y="379" fill="#444" font-size="22" text-anchor="end">›</text>
  <line x1="20" y1="402" x2="400" y2="402" stroke="#1C1C1C" stroke-width="1"/>

  <!-- Item 4 (partially visible) -->
  <text x="20" y="428" fill="#FFF" font-size="14" font-weight="500">Tue, Mar 11 – 18:45</text>
