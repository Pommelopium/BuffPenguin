<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 940"
     font-family="'Helvetica Neue', Arial, sans-serif">

  <!-- Outer background -->
  <rect width="420" height="940" fill="#1A1A1A"/>

  <!-- Screen label -->
  <text x="210" y="918" fill="#666" font-size="13" text-anchor="middle">2 / 5 — Home Screen</text>

  <!-- Phone body -->
  <rect x="5" y="5" width="410" height="890" rx="50" ry="50"
        fill="#000" stroke="#444" stroke-width="2"/>

  <!-- Dynamic island -->
  <rect x="150" y="18" width="120" height="30" rx="15" fill="#111"/>

  <!-- Status bar -->
  <text x="35" y="42" fill="#FFF" font-size="12" font-weight="600">9:41</text>
  <text x="385" y="42" fill="#FFF" font-size="11" text-anchor="end">● ● ▮</text>

  <!-- ── APP BAR ── -->
  <text x="20" y="100" fill="#FFF" font-size="18" font-weight="700">BuffPenguin</text>
  <!-- Settings gear icon (simplified) -->
  <circle cx="389" cy="95" r="11" fill="none" stroke="#888" stroke-width="1.8"/>
  <circle cx="389" cy="95" r="4.5" fill="none" stroke="#888" stroke-width="1.8"/>
  <rect x="387" y="80" width="4" height="4" rx="1" fill="#888"/>
  <rect x="387" y="107" width="4" height="4" rx="1" fill="#888"/>
  <rect x="375" y="93" width="4" height="4" rx="1" fill="#888"/>
  <rect x="401" y="93" width="4" height="4" rx="1" fill="#888"/>

  <!-- App bar bottom border -->
  <line x1="5" y1="115" x2="415" y2="115" stroke="#1C1C1C" stroke-width="1"/>

  <!-- ── START WORKOUT BUTTON ── -->
  <rect x="20" y="124" width="380" height="58" rx="5" fill="#FFF"/>
  <!-- Dumbbell icon (simplified) -->
  <rect x="38" y="146" width="6" height="14" rx="2" fill="#000"/>
  <rect x="50" y="149" width="18" height="8" rx="2" fill="#000"/>
  <rect x="68" y="146" width="6" height="14" rx="2" fill="#000"/>
