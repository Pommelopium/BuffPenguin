<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 940"
     font-family="'Helvetica Neue', Arial, sans-serif">

  <!-- Outer background -->
  <rect width="420" height="940" fill="#1A1A1A"/>

  <!-- Screen label -->
  <text x="210" y="918" fill="#666" font-size="13" text-anchor="middle">5 / 5 — Settings Screen</text>

  <!-- Phone body -->
  <rect x="5" y="5" width="410" height="890" rx="50" ry="50"
        fill="#000" stroke="#444" stroke-width="2"/>

  <!-- Dynamic island -->
  <rect x="150" y="18" width="120" height="30" rx="15" fill="#111"/>

  <!-- Status bar -->
  <text x="35" y="42" fill="#FFF" font-size="12" font-weight="600">9:41</text>
  <text x="385" y="42" fill="#FFF" font-size="11" text-anchor="end">● ● ▮</text>

  <!-- ── APP BAR ── -->
  <text x="20" y="100" fill="#FFF" font-size="20">‹</text>
  <text x="42" y="100" fill="#FFF" font-size="18" font-weight="700">Settings</text>
  <line x1="5" y1="115" x2="415" y2="115" stroke="#1C1C1C" stroke-width="1"/>

  <!-- ── SERVER ADDRESS SECTION ── -->
  <text x="20" y="144" fill="#666" font-size="11" letter-spacing="0.8">SERVER ADDRESS</text>

  <!-- URL input field (filled — shows current value) -->
  <rect x="20" y="153" width="380" height="56" rx="5"
        fill="none" stroke="#FFF" stroke-width="1.5"/>
  <text x="34" y="186" fill="#FFF" font-size="14">http://192.168.1.10:3000</text>

  <!-- Save & Connect button -->
  <rect x="20" y="225" width="380" height="54" rx="5" fill="#FFF"/>
  <text x="210" y="258" fill="#000" font-size="16" font-weight="700" text-anchor="middle">Save &amp; Connect</text>

  <!-- Divider -->
  <line x1="20" y1="298" x2="400" y2="298" stroke="#1C1C1C" stroke-width="1"/>

  <!-- Connection status -->
  <text x="20" y="322" fill="#555" font-size="12">Connected to:</text>
  <text x="20" y="340" fill="#555" font-size="12">http://192.168.1.10:3000</text>

  <!-- ── ANNOTATION CALLOUTS ── -->

  <!-- Callout: input shows current URL -->
  <line x1="220" y1="181" x2="310" y2="140" stroke="#444" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="312" y="124" width="84" height="28" rx="3" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="354" y="142" fill="#AAA" font-size="10" text-anchor="middle">current URL</text>

  <!-- Callout: focused border -->
  <line x1="20" y1="153" x2="10" y2="120" stroke="#444" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="7" y="104" width="84" height="28" rx="3" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="49" y="122" fill="#AAA" font-size="10" text-anchor="middle">focused state</text>

  <!-- ── NOTE ── -->
  <rect x="20" y="365" width="380" height="60" rx="5" fill="#0D1A0D" stroke="#1A3A1A" stroke-width="1"/>
  <text x="34" y="387" fill="#00FF88" font-size="11" font-weight="600">NOTE</text>
  <text x="34" y="404" fill="#888" font-size="11">mDNS auto-discovery runs on app launch.</text>
  <text x="34" y="419" fill="#888" font-size="11">Use this screen when AP isolation blocks it.</text>

  <!-- Home indicator -->
  <rect x="160" y="862" width="100" height="5" rx="2.5" fill="#333"/>
</svg>
