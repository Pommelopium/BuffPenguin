<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 940"
     font-family="'Helvetica Neue', Arial, sans-serif">

  <!-- Outer background -->
  <rect width="420" height="940" fill="#1A1A1A"/>

  <!-- Screen label -->
  <text x="210" y="918" fill="#666" font-size="13" text-anchor="middle">1 / 5 — Discovery Screen</text>

  <!-- Phone body -->
  <rect x="5" y="5" width="410" height="890" rx="50" ry="50"
        fill="#000" stroke="#444" stroke-width="2"/>

  <!-- Dynamic island -->
  <rect x="150" y="18" width="120" height="30" rx="15" fill="#111"/>

  <!-- Status bar -->
  <text x="35" y="42" fill="#FFF" font-size="12" font-weight="600">9:41</text>
  <text x="385" y="42" fill="#FFF" font-size="11" text-anchor="end">● ● ▮</text>

  <!-- ── CONTENT (vertically centred) ── -->

  <!-- App name -->
  <text x="210" y="290" fill="#FFF" font-size="30" font-weight="700" text-anchor="middle">BuffPenguin</text>
  <text x="210" y="320" fill="#888" font-size="14" text-anchor="middle">Looking for your server...</text>

  <!-- Spinner ring -->
  <circle cx="210" cy="368" r="24" fill="none" stroke="#2A2A2A" stroke-width="3"/>
  <!-- Active arc (top quarter) -->
  <path d="M210,344 A24,24 0 0,1 234,368" fill="none" stroke="#FFF" stroke-width="3" stroke-linecap="round"/>

  <!-- "Not found" state message -->
  <text x="210" y="428" fill="#FF4444" font-size="13" text-anchor="middle">Server not found on this network.</text>

  <!-- Separator / spacer label -->
  <text x="210" y="480" fill="#555" font-size="12" text-anchor="middle">Or enter the server address manually:</text>

  <!-- URL input field -->
  <rect x="20" y="492" width="380" height="52" rx="5"
        fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="34" y="523" fill="#444" font-size="13">http://192.168.1.x:3000</text>

  <!-- Connect button -->
  <rect x="20" y="558" width="380" height="54" rx="5" fill="#FFF"/>
  <text x="210" y="591" fill="#000" font-size="16" font-weight="700" text-anchor="middle">Connect</text>

  <!-- Home indicator -->
  <rect x="160" y="862" width="100" height="5" rx="2.5" fill="#333"/>
</svg>
